<!DOCTYPE html>
<html lang="zh_TW">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta charset="utf-8">
<title>搜尋結果 - Sid Automation Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0,minimal-ui">
<link id="wsite-base-style" rel="stylesheet" type="text/css" href="files/main_style.css" />
<link id="wsite-base-style" rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.css" onerror="this.outerHTML=''" />
<style>
body { background:#020937; color:#d5d5d5; font-family:'Segoe UI','Microsoft JhengHei',sans-serif; margin:0; }
.sid-search-shell { max-width:760px; margin:80px auto; padding:0 24px; }
.sid-search-shell h1 { color:#00f2ff; font-size:1.6rem; margin:0 0 24px; letter-spacing:1px; }
.sid-search-form { display:flex; gap:8px; margin-bottom:32px; }
.sid-search-form input { flex:1; padding:12px 16px; border-radius:8px; border:1px solid rgba(0,242,255,0.4); background:#051421; color:#fff; font-size:15px; outline:none; }
.sid-search-form input:focus { border-color:#00f2ff; box-shadow:0 0 0 2px rgba(0,242,255,0.2); }
.sid-search-form button { padding:0 20px; border-radius:8px; border:none; background:#00f2ff; color:#000; font-weight:700; cursor:pointer; }
.sid-search-count { color:#94a3b8; font-size:13px; margin:0 0 16px; }
.sid-search-hit { display:block; padding:16px 20px; background:rgba(10,20,25,0.7); border:1px solid rgba(0,242,255,0.2); border-radius:10px; margin-bottom:12px; text-decoration:none; transition:all .25s ease; }
.sid-search-hit:hover { border-color:#00f2ff; transform:translateY(-2px); }
.sid-search-title { display:block; color:#00f2ff; font-weight:700; font-size:16px; margin-bottom:6px; }
.sid-search-snippet { display:block; color:#cbd5e1; font-size:13px; line-height:1.6; }
.sid-search-empty { color:#94a3b8; font-size:14px; }
.sid-search-back { display:inline-block; margin-top:24px; color:#00f2ff; text-decoration:none; }
a.sid-search-back:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="sid-search-shell">
  <h1 id="sid-search-title">搜尋</h1>
  <form id="sid-search-form" class="sid-search-form">
    <input id="sid-search-input" name="q" type="search" placeholder="輸入關鍵字…" autocomplete="off" />
    <button type="submit">搜尋</button>
  </form>
  <div id="sid-search-results"></div>
  <a class="sid-search-back" href="index.html">← 回首頁</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
<script src="files/search.js" defer></script>
</body>
</html>
